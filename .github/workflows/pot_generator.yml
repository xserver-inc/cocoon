name: Generate POT file
on:
  workflow_dispatch:
  push:
    branches:
      - master
    # scripts/setup-wpcli.js の --exclude 対象外のPHPソースと揃える
    # （languages/ を含めないことで自己再トリガーも防止）
    paths:
      - 'blocks/**'
      - 'lib/**'
      - 'tmp/**'
      - 'skins/**'
      - 'templates/**'
      - '*.php'
      - 'theme.json'

permissions:
  contents: write

concurrency:
  group: pot-generator
  cancel-in-progress: false

jobs:
  WP_POT_Generator:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    # ローカルと同一のコマンド（scripts/setup-wpcli.js）でPOTを生成し、引数の乖離を防ぐ
    - name: Generate POT file
      run: npm run make-pot
    - name: Commit and push if changed
      shell: bash
      run: |
        git config user.name "GitHub Action"
        git config user.email "github.action@noreply.com"

        # 「#: file:line」の行番号参照はソース側の行増減だけで頻繁にズレるため、
        # その変化のみ（実質的な文字列変更なし）の場合はコミットしないようにする
        # ※ GitHub Actions の bash は -eo pipefail 付きで動くため、フィルタ結果が
        #   空（=grep が終了コード1）になるとステップが失敗してしまう。末尾の
        #   「|| true」で終了コードを吸収し、if 文まで確実に到達させる。
        CHANGED_LINES=$(git diff --unified=0 -- languages/cocoon.pot \
          | grep -E '^[+-]' \
          | grep -vE '^(\+\+\+|---)' \
          | grep -vE '^[+-]#: ' || true)

        if [ -n "$CHANGED_LINES" ]; then
          git add languages/cocoon.pot
          git commit -m "POT Regenerated"
          git pull --rebase
          git push
        else
          echo "行番号参照の変化のみのため、コミットをスキップします。"
        fi
