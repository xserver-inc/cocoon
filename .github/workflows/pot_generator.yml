name: Generate POT file
on:
  workflow_dispatch:
  push:
    branches:
      - master
    # scripts/setup-wpcli.js の --exclude 対象外のPHPソースと揃える
    # （languages/ を含めないことで自己再トリガーも防止）
    paths:
      - 'blocks/**'
      - 'lib/**'
      - 'tmp/**'
      - 'skins/**'
      - 'templates/**'
      - '*.php'
      - 'theme.json'

permissions:
  contents: write

concurrency:
  group: pot-generator
  cancel-in-progress: false

jobs:
  WP_POT_Generator:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    # ローカルと同一のコマンド（scripts/setup-wpcli.js）でPOTを生成し、引数の乖離を防ぐ
    - name: Generate POT file
      run: npm run make-pot
    - name: Commit and push if changed
      shell: bash
      run: |
        git config user.name "GitHub Action"
        git config user.email "github.action@noreply.com"

        git add languages/cocoon.pot
        DIFF_COUNT=$(git diff --cached --numstat | wc -l)
        if [ $DIFF_COUNT -ne 0 ]; then
          git commit -m "POT Regenerated"
          git pull --rebase
          git push
        fi
